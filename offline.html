<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PopUp Karaoke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0a1e 0%, #1a1333 50%, #2d1b69 100%);
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .retry-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        .contact-info {
            margin-top: 40px;
            padding: 25px;
            background: rgba(26, 19, 51, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .contact-info h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #a78bfa;
        }

        .contact-info a {
            color: #a78bfa;
            text-decoration: none;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🎤</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry, you can still reach us!</p>
        <button class="retry-btn" onclick="location.reload()">Try Again</button>
        
        <div class="contact-info">
            <h2>Contact Us Offline</h2>
            <p>
                📞 <strong>Call:</strong> <a href="tel:2197581313">219.758.1313</a><br>
                ✉️ <strong>Email:</strong> <a href="mailto:booking@popupkaraoke.net">booking@popupkaraoke.net</a>
            </p>
        </div>
    </div>
</body>
</html>
