<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Mic capsule -->
  <rect x="11" y="1" width="10" height="16" rx="5" fill="#ff2d92" stroke="#1a0008" stroke-width="1.5"/>
  <!-- Grille lines -->
  <line x1="12.5" y1="7"  x2="19.5" y2="7"  stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <line x1="12.5" y1="10" x2="19.5" y2="10" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <line x1="12.5" y1="13" x2="19.5" y2="13" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <!-- Stand arc -->
  <path d="M6 17 Q6 25 16 25 Q26 25 26 17" stroke="#1a0008" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M6 17 Q6 25 16 25 Q26 25 26 17" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Pole -->
  <line x1="16" y1="25" x2="16" y2="30" stroke="#1a0008" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="16" y2="30" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="10" y1="30" x2="22" y2="30" stroke="#1a0008" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="30" x2="22" y2="30" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
